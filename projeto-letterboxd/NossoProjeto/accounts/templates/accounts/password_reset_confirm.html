{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'accounts/css/forms.css' %}">
    <title>Nova senha — FakeLetterboxd</title>
</head>
<body>
    <header class="header">
        <a href="{% url 'portal:home' %}" class="logo">FakeLetterboxd</a>
    </header>

    <div class="form-wrapper">
        <div class="form-card">
            {% if validlink %}
                <h1>Nova senha</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn-submit">Salvar nova senha</button>
                </form>
            {% else %}
                <h1>Link inválido</h1>
                <p>Este link de redefinição é inválido ou já expirou.</p>
                <div class="form-footer">
                    <p><a href="{% url 'accounts:password_reset' %}">Solicitar novo link</a></p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
