{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'accounts/css/forms.css' %}">
    <title>Login — FakeLetterboxd</title>
</head>
<body>
    <header class="header">
        <a href="{% url 'portal:home' %}" class="logo">FakeLetterboxd</a>
    </header>

    <div class="form-wrapper">
        <div class="form-card">
            <h1>Entrar</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
            <div class="form-footer">
                <p><a href="{% url 'accounts:password_reset' %}">Esqueci minha senha</a></p>
                <p>Não tem conta? <a href="{% url 'accounts:cadastro' %}">Cadastre-se</a></p>
            </div>
        </div>
    </div>
</body>
</html>
