{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apaga Avaliação</title>
    <link rel="stylesheet" href="{% static 'main/css/apagaAvaliacao.css' %}">
</head>
<nav></nav>
<body>
    <h1>Remoção de Avaliação</h1>
    
    <form method="POST">
        {% csrf_token %}
        <p>Confirma a remoção de <strong style="color: #fff;">{{ avaliacao.midia.titulo }}</strong>?</p>
        <br>
        <div class="button-group">
            <button type="button">
                <a href="{% url 'main:lista-avaliacao' %}">Cancelar</a>
            </button>
            <input type="submit" value="Remover">
        </div>
    </form>
</body>
</html>
